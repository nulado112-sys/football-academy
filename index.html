<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Zone Football Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5cb85c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="John Zone">
    <link rel="apple-touch-icon" href="logo.svg">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="logo.svg" alt="John Zone Logo" class="academy-logo">
            </div>
            <h1>John Zone Football Academy</h1>
            <p>Member & Payment Manager</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <h3 id="total-members">0</h3>
                <p>Total Members</p>
            </div>
            <div class="stat-card">
                <h3 id="pending-payments">0</h3>
                <p>Pending Payments</p>
            </div>
        </div>

        <div class="section">
            <h2>Add New Member</h2>
            <form id="member-form">
                <input type="text" id="member-name" placeholder="Member Name" required>
                <input type="tel" id="member-phone" placeholder="Phone Number (for WhatsApp)" required>
                <input type="date" id="join-date" required>
                <input type="number" id="monthly-fee" placeholder="Monthly Fee ($)" required>
                <button type="submit">Add Member</button>
            </form>
        </div>

        <div class="section">
            <h2>Members & Payments</h2>
            <div style="margin-bottom: 15px;">
                <button onclick="academy.testDailyNotification()" class="btn-small btn-warning">🔔 Test Daily Payment Alert</button>
            </div>
            <div id="members-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
